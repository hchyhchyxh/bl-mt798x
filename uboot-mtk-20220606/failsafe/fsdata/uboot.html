<!DOCTYPE HTML>
<html>
	<head>
		<meta charset="utf-8">
		<title>U-Boot 更新</title>
		<link rel="stylesheet" href="/style.css">
		<script src="/index.js"></script>
	</head>
	<body onload="getversion()">
		<div id="m">
			<h1>U-BOOT 更新</h1>
			<p id="hint">你要更新 <strong>U-Boot引导加载程序</strong>在此设备上。<br>请从本地硬盘中选择文件，然后单击 <strong>上传</strong> 按钮。</p>
			<form id="form">
				<input id="file" type="file" name="fip">
				<input type="button" value="Upload" onclick="upload('fip')">
			</form>
			<div>
				<div class="bar" id="bar" style="display: none; --percent: 0;"></div>
			</div>
			<div id="size" style="display: none;">Size: xxxx</div>
			<div id="md5" style="display: none;">MD5: xxxx</div>
			<div id="upgrade" style="display: none;">
				<p>U-Boot已上传，请点击“更新”</p>
				<button class="button" onclick="location = '/flashing.html'">升级</button>
			</div>
			<div class="i w">
				<strong>警告</strong>
				<ul>
					<li>请勿在更新期间关闭设备电源</li>
					<li>如果一切顺利，设备将重新启动</li>
					<li>您可以上传任何您想要的内容，因此请确保为您的设备选择合适的 U-Boot 映像</li>
					<li>更新U-Boot是一项非常危险的操作，可能会损坏您的设备！</li>
				</ul>
			</div>
		</div>
        <div id="version"></div>
	</body>
</html>
